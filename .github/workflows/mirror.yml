name: Mirror to Gitverse

on:
  push:
    branches: [master]
    tags: ["v*"]

jobs:
  mirror:
    name: Mirror
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure SSH key
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.GITVERSE_SSH_KEY }}" | tr -d '\r' > ~/.ssh/gitverse_deploy
          chmod 600 ~/.ssh/gitverse_deploy
          cat >> ~/.ssh/config <<'EOF'
          Host gitverse.ru
            IdentityFile ~/.ssh/gitverse_deploy
            StrictHostKeyChecking yes
          EOF
          ssh-keygen -y -f ~/.ssh/gitverse_deploy > /dev/null

      - name: Add Gitverse host key
        run: |
          cat >> ~/.ssh/known_hosts <<'EOF'
          gitverse.ru ssh-rsa 
          EOF

      - name: Push to Gitverse
        run: |
          git remote add gitverse git@gitverse.ru:rustwizard/etch.git
          git push gitverse refs/remotes/origin/master:refs/heads/master
          git push gitverse --tags

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/gitverse_deploy
